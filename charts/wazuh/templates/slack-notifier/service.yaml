{{- if .Values.slackNotifier.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "wazuh.fullname" . }}-slack-notifier
  labels:
    app: {{ include "wazuh.fullname" . }}-slack-notifier
spec:
  type: {{ .Values.slackNotifier.service.type }}
  selector:
    app: {{ include "wazuh.fullname" . }}-slack-notifier
  ports:
    - name: http
      port: {{ .Values.slackNotifier.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
